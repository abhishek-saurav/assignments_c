<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Weather App Homepage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: white;
      background-color: #0d1b2a;
      background-image: radial-gradient(circle, white 1px, transparent 1px);
      background-size: 28px 28px;
      background-repeat: repeat;
      background-attachment: fixed;
    }

    .weather-card {
      width: 380px;
      margin: 40px auto;
      padding: 32px;
      background: linear-gradient(to bottom, #1565c0, #0d47a1);
      text-align: center;
    }

    .city-name {
      font-size: 28px;
      font-weight: bold;
    }

    .temperature {
      font-size: 72px;
      font-weight: bold;
    }

    .condition {
      font-size: 18px;
      color: #bbdefb;
    }

    .weather-icon {
      font-size: 64px;
      display: inline-block;
      animation-name: float;
      animation-duration: 2.5s;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }

    .forecast-section {
      width: 380px;
      margin: 0 auto 40px;
      padding: 20px;
      background: radial-gradient(circle at top, #1a237e, #0d1b2a);
    }

    .forecast-section h2 {
      font-size: 16px;
      color: #90caf9;
    }

    .forecast-day {
      font-size: 15px;
      padding: 6px 0;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

  <div class="weather-card">
    <div class="city-name">Bangalore, India</div>
    <div class="weather-icon">⛅</div>
    <div class="temperature">27°C</div>
    <div class="condition">Partly Cloudy</div>
  </div>

  <div class="forecast-section">
    <h2>7-Day Forecast</h2>
    <div class="forecast-day">Monday — 🌧️ — 24°C</div>
    <div class="forecast-day">Tuesday — ☀️ — 30°C</div>
    <div class="forecast-day">Wednesday — ⛅ — 27°C</div>
    <div class="forecast-day">Thursday — 🌩️ — 22°C</div>
    <div class="forecast-day">Friday — ☀️ — 32°C</div>
    <div class="forecast-day">Saturday — 🌤️ — 29°C</div>
    <div class="forecast-day">Sunday — 🌧️ — 25°C</div>
  </div>

</body>
</html>
