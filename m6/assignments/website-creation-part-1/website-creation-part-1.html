<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Portfolio</title>
  <style>
    body { background-color: #2b2b2b; font-family: 'Roboto Slab', serif; }
    .navbar { background-color: #1a1a1a; }
    .navbar-brand { color: #f2a900 !important; font-weight: 700; }
    .nav-link { color: white !important; }
    #banner { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 100px 0; }
    .banner-heading { font-size: 3rem; font-weight: 900; color: white; }
    .banner-subtext { color: rgba(255,255,255,0.85); font-size: 1.2rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="#">My Portfolio</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="#social-media">Social Media</a></li>
      </ul>
    </div>
  </nav>
  <div id="banner">
    <div class="container text-center">
      <h1 class="banner-heading">Hi, I'm a Web Developer</h1>
      <p class="banner-subtext">I build websites using HTML, CSS, Bootstrap and JavaScript</p>
      <a href="#projects" class="btn btn-warning mt-3">View Projects</a>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
</body>
</html>
