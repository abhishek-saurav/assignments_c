<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
  <script src="https://kit.fontawesome.com/996973c893.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />
  <title>Portfolio</title>
  <style>
    body { font-family: "Barlow Semi Condensed", sans-serif; }
    #social-media { background: #2f3550; }
    .m-heading { font-weight: 700; margin-top: 6px; }
    .media_link { border: 2px solid #f2a900; border-radius: 4px; padding: 14px 18px; margin-right: 18px; background: transparent; text-align: left; }
    .row.pt-5 { gap: 18px; }
    .media_link h3 { font-size: 16px; font-weight: 600; }
    .media_link i { font-size: 22px; }
    .media_link.bg-warning { border: 2px solid #f2a900; }
  </style>
</head>
<body>
  <div id="social-media" class="container-fluid">
    <div class="container text-white py-5">
      <h4 class="text-warning">Social Media</h4>
      <h1 class="m-heading">Let's be friends</h1>
      <div class="row pt-5">
        <div class="col-3 media_link btn text-white">
          <i class="fab fa-linkedin fa-2x"></i>
          <h3>LinkedIn</h3>
        </div>
        <div class="col-3 media_link btn text-white">
          <i class="fab fa-youtube fa-2x"></i>
          <h3>YouTube</h3>
        </div>
        <div class="col-3 media_link btn text-dark bg-warning">
          <i class="fas fa-envelope fa-2x"></i>
          <h3>Email</h3>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
