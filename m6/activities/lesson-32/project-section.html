<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Portfolio</title>
  <style>
    body { background: #2b2b2b; font-family: "Barlow Semi Condensed", sans-serif; }
    #projects h1 { font-weight: 900; }
    .card { border: 0; border-radius: 3px; box-shadow: 0 6px 18px rgba(0,0,0,.35); }
    .card-img-top { padding: 18px; height: 13rem; object-fit: contain; }
    .card-text { color: #6f7780; font-size: .85rem; }
    .btn-warning { font-weight: 700; font-size: .8rem; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="projects" class="container text-white py-5">
    <h4 class="text-warning">Projects</h4>
    <h1>My Work</h1>
    <div class="row mt-4">
      <div class="col-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Project 1</h5>
            <p class="card-text">A simple web page built with HTML and CSS.</p>
            <a href="#" class="btn btn-warning">View</a>
          </div>
        </div>
      </div>
      <div class="col-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Project 2</h5>
            <p class="card-text">A responsive layout using Bootstrap grid.</p>
            <a href="#" class="btn btn-warning">View</a>
          </div>
        </div>
      </div>
      <div class="col-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Project 3</h5>
            <p class="card-text">A JavaScript interactive page.</p>
            <a href="#" class="btn btn-warning">View</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
