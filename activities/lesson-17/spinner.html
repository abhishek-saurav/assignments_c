<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spinner</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

  <div class="container" style="margin-top: 30px;">
    <h1 style="color: #1a237e;">Bootstrap Spinners</h1>

    <h4 style="color: #37474f; margin-top: 20px;">Border Spinners</h4>
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-border text-success" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-border text-danger" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-border text-warning" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-border text-dark" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>

    <h4 style="color: #37474f; margin-top: 30px;">Grow Spinners</h4>
    <div class="spinner-grow text-primary" role="status">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-grow text-success" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-grow text-danger" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>

    <h4 style="color: #37474f; margin-top: 30px;">Spinner Sizes</h4>
    <div class="spinner-border spinner-border-sm text-primary" role="status">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-border text-primary" role="status" style="margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem; margin-left: 10px;">
      <span class="sr-only">Loading...</span>
    </div>

    <h4 style="color: #37474f; margin-top: 30px;">Spinner inside a button</h4>
    <button class="btn btn-primary" disabled>
      <span class="spinner-border spinner-border-sm" role="status"></span>
      Loading...
    </button>
  </div>

  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
