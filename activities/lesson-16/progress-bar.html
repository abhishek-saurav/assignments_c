<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Progress Bar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

  <div class="container" style="margin-top: 30px;">
    <h1 style="color: #1a237e;">Bootstrap Progress Bars</h1>

    <h4 style="color: #37474f; margin-top: 20px;">My Skill Progress</h4>

    <p style="color: #546e7a;">HTML</p>
    <div class="progress" style="margin-bottom: 14px;">
      <div class="progress-bar" style="width: 80%;">80%</div>
    </div>

    <p style="color: #546e7a;">CSS</p>
    <div class="progress" style="margin-bottom: 14px;">
      <div class="progress-bar bg-success" style="width: 65%;">65%</div>
    </div>

    <p style="color: #546e7a;">Bootstrap</p>
    <div class="progress" style="margin-bottom: 14px;">
      <div class="progress-bar bg-warning" style="width: 45%;">45%</div>
    </div>

    <p style="color: #546e7a;">JavaScript</p>
    <div class="progress" style="margin-bottom: 14px;">
      <div class="progress-bar bg-danger" style="width: 20%;">20%</div>
    </div>

    <h4 style="color: #37474f; margin-top: 30px;">Striped Progress Bar</h4>
    <div class="progress" style="margin-bottom: 14px;">
      <div class="progress-bar progress-bar-striped" style="width: 60%;">60%</div>
    </div>

    <h4 style="color: #37474f; margin-top: 20px;">Animated Progress Bar</h4>
    <div class="progress">
      <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 75%;">75%</div>
    </div>
  </div>

  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
