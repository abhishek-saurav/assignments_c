<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jumbotron and Buttons</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

  <div class="container" style="margin-top: 30px;">

    <div class="jumbotron">
      <h1 class="display-4">Hello, I'm Sam!</h1>
      <p class="lead">I'm a student learning Bootstrap. This is a jumbotron — it's great for hero sections.</p>
      <hr class="my-4">
      <p>Click the button below to learn more about my projects.</p>
      <a class="btn btn-primary btn-lg" href="#">See My Work</a>
    </div>

    <h2 style="color: #1a237e;">Button Styles</h2>

    <p>
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-success">Success</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-warning">Warning</button>
      <button class="btn btn-info">Info</button>
      <button class="btn btn-dark">Dark</button>
      <button class="btn btn-light">Light</button>
    </p>

    <h4 style="color: #1a237e; margin-top: 20px;">Outline Buttons</h4>
    <p>
      <button class="btn btn-outline-primary">Outline Primary</button>
      <button class="btn btn-outline-success">Outline Success</button>
      <button class="btn btn-outline-danger">Outline Danger</button>
    </p>

    <h4 style="color: #1a237e; margin-top: 20px;">Button Sizes</h4>
    <p>
      <button class="btn btn-primary btn-lg">Large</button>
      <button class="btn btn-primary">Normal</button>
      <button class="btn btn-primary btn-sm">Small</button>
    </p>

    <h4 style="color: #1a237e; margin-top: 20px;">Disabled Button</h4>
    <p>
      <button class="btn btn-primary" disabled>Disabled</button>
    </p>

  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
