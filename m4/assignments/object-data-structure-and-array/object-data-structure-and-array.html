<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Data Structure and Array</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    h2 {
      color: #1b5e20;
      text-align: center;
    }

    .output {
      background-color: #263238;
      color: #a5d6a7;
      font-family: monospace;
      padding: 16px;
      margin: 20px auto;
      width: 540px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>Object Data Structure and Array</h2>
  <div class="output" id="out"></div>

  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var students = [
      { name: "Sam", age: 15, grade: "A" },
      { name: "Priya", age: 16, grade: "B" },
      { name: "Rohan", age: 15, grade: "A" },
      { name: "Aisha", age: 17, grade: "C" }
    ];

    log("--- All Students ---");
    for (var i = 0; i < students.length; i++) {
      log(students[i].name + " | Age: " + students[i].age + " | Grade: " + students[i].grade);
    }

    log("");
    log("--- Students with Grade A ---");
    for (var i = 0; i < students.length; i++) {
      if (students[i].grade == "A") {
        log(students[i].name);
      }
    }

    log("");
    log("Total students: " + students.length);
  </script>

</body>
</html>
