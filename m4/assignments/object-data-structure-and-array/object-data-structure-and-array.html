<!DOCTYPE html>
<html>
<body>
  <h2>Object Data Structure and Array</h2>
  <p id="demo"></p>
  <script>
    var student = {
      name: "Sam",
      age: 15,
      hobbies: ["chess", "photography", "guitar"],
    };
    document.getElementById("demo").innerHTML =
      student.name + "<br>" +
      student.age + "<br>" +
      student.hobbies.join(", ");
  </script>
</body>
</html>
