<!DOCTYPE html>
<html>
<body>
  <h2>Methods and Loops</h2>
  <p id="demo"></p>
  <script>
    var hobbies = ["chess", "photography", "guitar", "coding"];
    var text = "";
    var i;
    for (i = 0; i < hobbies.length; i++) {
      text += hobbies[i].toUpperCase() + "<br>";
    }
    document.getElementById("demo").innerHTML = text;
  </script>
</body>
</html>
