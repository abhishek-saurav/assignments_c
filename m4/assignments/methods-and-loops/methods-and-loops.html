<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Methods and Loops</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    h2 {
      color: #4a148c;
      text-align: center;
    }

    .output {
      background-color: #263238;
      color: #ce93d8;
      font-family: monospace;
      padding: 16px;
      margin: 20px auto;
      width: 500px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>Methods and Loops</h2>
  <div class="output" id="out"></div>

  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var hobbies = ["chess", "photography", "guitar", "coding"];

    log("--- Looping through hobbies ---");
    for (var i = 0; i < hobbies.length; i++) {
      log((i + 1) + ". " + hobbies[i].toUpperCase());
    }

    log("");
    log("--- String methods on each hobby ---");
    for (var i = 0; i < hobbies.length; i++) {
      var h = hobbies[i];
      log(h + " has " + h.length + " characters");
    }

    log("");
    log("--- Search with includes() ---");
    for (var i = 0; i < hobbies.length; i++) {
      if (hobbies[i].includes("o")) {
        log(hobbies[i] + " contains the letter 'o'");
      }
    }
  </script>

</body>
</html>
