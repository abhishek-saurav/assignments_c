<!DOCTYPE html>
<html>
<body>
  <h2>Accessing Values with HTML DOM Structure</h2>
  <input type="text" id="nameInput" placeholder="Enter your name">
  <button onclick="showMessage()">Submit</button>
  <p id="output"></p>
  <script>
    function showMessage() {
      var name = document.getElementById("nameInput").value;
      document.getElementById("output").innerHTML = "Welcome, " + name + "!";
      document.getElementById("output").style.backgroundColor = "lightblue";
    }
  </script>
</body>
</html>
