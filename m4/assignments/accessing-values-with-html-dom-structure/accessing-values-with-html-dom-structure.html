<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessing Values with HTML DOM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    #box {
      width: 360px;
      margin: 40px auto;
      background-color: white;
      border: 2px solid #1565c0;
      padding: 24px;
    }

    h2 {
      color: #1565c0;
      text-align: center;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #c5cae9;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background-color: #1565c0;
      color: white;
      border: none;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    #output {
      margin-top: 16px;
      padding: 12px;
      background-color: #e3f2fd;
      border: 1px solid #1565c0;
      font-size: 15px;
      color: #1a237e;
      display: none;
    }
  </style>
</head>
<body>

  <div id="box">
    <h2>Student Profile Form</h2>

    <input type="text" id="inp-name" placeholder="Enter your name">
    <input type="number" id="inp-age" placeholder="Enter your age">
    <input type="text" id="inp-hobby" placeholder="Enter your hobby">

    <button onclick="showProfile()">Show Profile</button>

    <div id="output"></div>
  </div>

  <script>
    function showProfile() {
      var name = document.getElementById("inp-name").value;
      var age = document.getElementById("inp-age").value;
      var hobby = document.getElementById("inp-hobby").value;

      var outputDiv = document.getElementById("output");
      outputDiv.style.display = "block";
      outputDiv.innerHTML =
        "<strong>Name:</strong> " + name + "<br>" +
        "<strong>Age:</strong> " + age + "<br>" +
        "<strong>Hobby:</strong> " + hobby;
    }
  </script>

</body>
</html>
