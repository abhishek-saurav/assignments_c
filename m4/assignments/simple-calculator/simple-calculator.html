<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    #calculator {
      width: 300px;
      margin: 40px auto;
      background-color: white;
      border: 2px solid #1a237e;
      padding: 24px;
    }

    h2 {
      color: #1a237e;
      text-align: center;
    }

    input[type="number"] {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #c5cae9;
      font-size: 15px;
    }

    .btn-row {
      margin-top: 12px;
    }

    button {
      width: 48%;
      padding: 10px;
      margin: 3px 1%;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      color: white;
    }

    #btn-add  { background-color: #1565c0; }
    #btn-sub  { background-color: #6a1b9a; }
    #btn-mul  { background-color: #2e7d32; }
    #btn-div  { background-color: #bf360c; }

    #result {
      margin-top: 16px;
      padding: 12px;
      background-color: #e3f2fd;
      border: 1px solid #1565c0;
      font-size: 16px;
      color: #1a237e;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="calculator">
    <h2>Simple Calculator</h2>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <div class="btn-row">
      <button id="btn-add" onclick="calculate('+')">+</button>
      <button id="btn-sub" onclick="calculate('-')">-</button>
      <button id="btn-mul" onclick="calculate('*')">×</button>
      <button id="btn-div" onclick="calculate('/')">÷</button>
    </div>

    <div id="result">Result will appear here</div>
  </div>

  <script>
    function calculate(operator) {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      var result;

      if (operator == "+") {
        result = num1 + num2;
      } else if (operator == "-") {
        result = num1 - num2;
      } else if (operator == "*") {
        result = num1 * num2;
      } else if (operator == "/") {
        if (num2 == 0) {
          document.getElementById("result").innerHTML = "Cannot divide by zero";
          return;
        }
        result = num1 / num2;
      }

      document.getElementById("result").innerHTML = num1 + " " + operator + " " + num2 + " = " + result;
    }
  </script>

</body>
</html>
