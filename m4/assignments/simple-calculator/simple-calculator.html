<!DOCTYPE html>
<html>
<body>
  <h2>Simple Calculator</h2>
  <p id="demo"></p>
  <script>
    var num1 = 20;
    var num2 = 5;
    var add = num1 + num2;
    var sub = num1 - num2;
    var mul = num1 * num2;
    var div = num1 / num2;
    document.getElementById("demo").innerHTML =
      num1 + " + " + num2 + " = " + add + "<br>" +
      num1 + " - " + num2 + " = " + sub + "<br>" +
      num1 + " * " + num2 + " = " + mul + "<br>" +
      num1 + " / " + num2 + " = " + div;
  </script>
</body>
</html>
