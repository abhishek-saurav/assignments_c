<!DOCTYPE html>
<html>
<body>
  <p>Sum of arguments using the arguments object</p>
  <p id="result"></p>
  <script>
    function sumAll() {
      var i;
      var total = 0;
      for (i = 0; i < arguments.length; i++) {
        total += arguments[i];
      }
      return total;
    }
    document.getElementById("result").innerHTML = sumAll(10, 20, 30);
  </script>
</body>
</html>
