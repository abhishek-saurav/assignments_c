<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Using Functions</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    #box {
      width: 320px;
      margin: 40px auto;
      background-color: white;
      border: 2px solid #2e7d32;
      padding: 24px;
    }

    h2 {
      color: #2e7d32;
      text-align: center;
    }

    input[type="number"] {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #a5d6a7;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background-color: #2e7d32;
      color: white;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 14px;
      padding: 12px;
      background-color: #e8f5e9;
      border: 1px solid #2e7d32;
      font-size: 16px;
      color: #1b5e20;
      text-align: center;
    }

    .output {
      background-color: #263238;
      color: #aed581;
      font-family: monospace;
      padding: 14px;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="box">
    <h2>Multiplication Using Functions</h2>
    <input type="number" id="num1" placeholder="First number">
    <input type="number" id="num2" placeholder="Second number">
    <button onclick="showResult()">Multiply</button>
    <div id="result">Result will appear here</div>
  </div>

  <div class="output" id="out"></div>

  <script>
    function multiply(a, b) {
      return a * b;
    }

    function showResult() {
      var a = parseFloat(document.getElementById("num1").value);
      var b = parseFloat(document.getElementById("num2").value);
      var answer = multiply(a, b);
      document.getElementById("result").innerHTML = a + " × " + b + " = " + answer;
    }

    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    log("multiply(3, 4) = " + multiply(3, 4));
    log("multiply(5, 6) = " + multiply(5, 6));
    log("multiply(7, 8) = " + multiply(7, 8));
    log("multiply(10, 10) = " + multiply(10, 10));
  </script>

</body>
</html>
