<!DOCTYPE html>
<html>
<body>
  <h2>Parameters and Optional Parameters</h2>
  <p id="demo"></p>
  <script>
    function greet(name, age) {
      return "Hi " + name + ", you are " + age + " years old.";
    }
    document.getElementById("demo").innerHTML = greet("Sam", 15);
  </script>
</body>
</html>
