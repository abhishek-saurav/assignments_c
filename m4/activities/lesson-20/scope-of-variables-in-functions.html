<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scope of Variables in Functions</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #4a148c; text-align: center; }
    .output { background-color: #263238; color: #ce93d8; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Scope of Variables in Functions</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var globalName = "Sam";

    function showScope() {
      var localName = "Rohan";
      log("Inside function — globalName: " + globalName);
      log("Inside function — localName: " + localName);
    }

    showScope();
    log("Outside function — globalName: " + globalName);
    log("Outside function — localName is not accessible here");
  </script>
</body>
</html>
