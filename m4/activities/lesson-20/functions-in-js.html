<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Functions in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #4a148c; text-align: center; }
    .output { background-color: #263238; color: #ce93d8; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Functions in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    function greet() {
      log("Hello, I am Sam!");
    }

    function showHobby() {
      log("My favourite hobby is chess.");
    }

    function addNumbers(a, b) {
      return a + b;
    }

    greet();
    showHobby();
    log("5 + 3 = " + addNumbers(5, 3));
    log("10 + 20 = " + addNumbers(10, 20));
  </script>
</body>
</html>
