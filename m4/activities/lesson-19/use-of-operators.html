<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Use of Operators</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1a237e; text-align: center; }
    .output { background-color: #263238; color: #90caf9; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Use of Operators</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var a = 10;
    var b = 3;

    log("--- Arithmetic ---");
    log("a + b = " + (a + b));
    log("a - b = " + (a - b));
    log("a * b = " + (a * b));
    log("a / b = " + (a / b));
    log("a % b = " + (a % b));

    log("--- Comparison ---");
    log("a > b: " + (a > b));
    log("a < b: " + (a < b));
    log("a == b: " + (a == b));
    log("a != b: " + (a != b));

    log("--- Logical ---");
    log("a > 5 && b < 5: " + (a > 5 && b < 5));
    log("a > 20 || b < 5: " + (a > 20 || b < 5));
    log("!(a == b): " + !(a == b));
  </script>
</body>
</html>
