<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1b5e20; text-align: center; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Switch in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    function getActivity(day) {
      switch(day) {
        case "Monday":
          return "Chess practice";
        case "Wednesday":
          return "Coding project";
        case "Friday":
          return "Guitar session";
        case "Saturday":
          return "Photography walk";
        case "Sunday":
          return "Rest day";
        default:
          return "School day";
      }
    }

    var days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    for (var i = 0; i < days.length; i++) {
      log(days[i] + " → " + getActivity(days[i]));
    }
  </script>
</body>
</html>
