<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loops in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1b5e20; text-align: center; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Loops in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    log("--- for loop (1 to 5) ---");
    for (var i = 1; i <= 5; i++) {
      log("Number: " + i);
    }

    log("");
    log("--- while loop (countdown) ---");
    var count = 5;
    while (count > 0) {
      log("Countdown: " + count);
      count--;
    }
    log("Done!");

    log("");
    log("--- for loop (multiplication table of 3) ---");
    for (var i = 1; i <= 5; i++) {
      log("3 x " + i + " = " + (3 * i));
    }
  </script>
</body>
</html>
