<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Methods in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1b5e20; text-align: center; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Methods in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var name = "sam sharma";
    log("Original: " + name);
    log("toUpperCase: " + name.toUpperCase());
    log("length: " + name.length);
    log("includes('sam'): " + name.includes("sam"));
    log("indexOf('sharma'): " + name.indexOf("sharma"));
    log("slice(0,3): " + name.slice(0, 3));
    log("replace('sam','Sam'): " + name.replace("sam", "Sam"));

    log("");
    var num = 3.7;
    log("Math.round(3.7) = " + Math.round(num));
    log("Math.floor(3.7) = " + Math.floor(num));
    log("Math.ceil(3.7) = " + Math.ceil(num));
  </script>
</body>
</html>
