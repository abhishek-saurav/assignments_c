<!DOCTYPE html>
<html>
<body>
  <h2>Test Methods in JS</h2>
  <p>Using the test() method with Regular Expressions</p>
  <script>
    var str = "I love coding";
    var patt1 = new RegExp("coding");
    var patt2 = new RegExp("chess");
    document.write(patt1.test(str));
    document.write("<br>");
    document.write(patt2.test(str));
  </script>
</body>
</html>
