<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Methods in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1b5e20; text-align: center; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Test Methods in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var sentence = "I love coding and chess";

    log("startsWith('I'): " + sentence.startsWith("I"));
    log("endsWith('chess'): " + sentence.endsWith("chess"));
    log("includes('coding'): " + sentence.includes("coding"));
    log("toUpperCase: " + sentence.toUpperCase());
    log("split(' '): " + sentence.split(" "));

    log("");
    var words = sentence.split(" ");
    log("Number of words: " + words.length);
    for (var i = 0; i < words.length; i++) {
      log("Word " + (i+1) + ": " + words[i]);
    }
  </script>
</body>
</html>
