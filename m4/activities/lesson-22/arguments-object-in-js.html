<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arguments Object in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #bf360c; text-align: center; }
    .output { background-color: #263238; color: #ffcc80; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Arguments Object in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    function showArgs() {
      log("Number of arguments: " + arguments.length);
      for (var i = 0; i < arguments.length; i++) {
        log("arguments[" + i + "] = " + arguments[i]);
      }
    }

    log("--- Calling showArgs(10, 20, 30) ---");
    showArgs(10, 20, 30);

    log("");
    log("--- Calling showArgs('Sam', 15, 'chess') ---");
    showArgs("Sam", 15, "chess");
  </script>
</body>
</html>
