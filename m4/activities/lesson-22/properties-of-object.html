<!DOCTYPE html>
<html>
<body>
  <h2>Properties of Object</h2>
  <p id="demo"></p>
  <script>
    var student = {
      name: "Sam",
      age: 15,
      grade: 9,
    };
    document.getElementById("demo").innerHTML = student["name"] + " is in grade " + student["grade"];
  </script>
</body>
</html>
