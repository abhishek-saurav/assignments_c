<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties of Object</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #bf360c; text-align: center; }
    .output { background-color: #263238; color: #ffcc80; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Properties of Object</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var student = {
      name: "Sam",
      age: 15,
      hobby: "chess"
    };

    log("Before update: " + student.name + ", " + student.age);

    student.age = 16;
    student.hobby = "photography";

    log("After update: " + student.name + ", " + student.age);
    log("New hobby: " + student.hobby);

    student.city = "Bangalore";
    log("Added city: " + student.city);

    log("");
    log("All keys:");
    var keys = Object.keys(student);
    for (var i = 0; i < keys.length; i++) {
      log(keys[i] + ": " + student[keys[i]]);
    }
  </script>
</body>
</html>
