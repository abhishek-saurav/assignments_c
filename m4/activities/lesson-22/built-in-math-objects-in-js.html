<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Built-in Math Objects in JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #bf360c; text-align: center; }
    .output { background-color: #263238; color: #ffcc80; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Built-in Math Objects in JS</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    log("Math.PI = " + Math.PI);
    log("Math.round(4.6) = " + Math.round(4.6));
    log("Math.floor(4.9) = " + Math.floor(4.9));
    log("Math.ceil(4.1) = " + Math.ceil(4.1));
    log("Math.abs(-7) = " + Math.abs(-7));
    log("Math.pow(2, 8) = " + Math.pow(2, 8));
    log("Math.sqrt(144) = " + Math.sqrt(144));
    log("Math.max(3, 8, 1, 9, 2) = " + Math.max(3, 8, 1, 9, 2));
    log("Math.min(3, 8, 1, 9, 2) = " + Math.min(3, 8, 1, 9, 2));
    log("Math.random() = " + Math.random());
  </script>
</body>
</html>
