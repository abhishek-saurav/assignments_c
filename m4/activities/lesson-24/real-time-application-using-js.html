<!DOCTYPE html>
<html>
<body>
  <h2>Real Time Application Using JS</h2>
  <p>Enter your name:</p>
  <input type="text" id="nameInput">
  <button onclick="showName()">Show</button>
  <p id="output"></p>
  <script>
    function showName() {
      var name = document.getElementById("nameInput").value;
      document.getElementById("output").innerHTML = "Hello " + name + "!";
    }
  </script>
</body>
</html>
