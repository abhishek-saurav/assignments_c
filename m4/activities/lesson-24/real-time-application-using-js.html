<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Time Application Using JS</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #2e7d32; text-align: center; }
    .card { background-color: white; border: 1px solid #ccc; padding: 16px; margin: 20px auto; width: 400px; }
    .card input { width: 90%; padding: 6px; margin: 6px 0; font-size: 14px; }
    .card button { padding: 8px 20px; background-color: #2e7d32; color: white; border: none; cursor: pointer; font-size: 14px; margin-top: 8px; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 400px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Real Time Application Using JS</h2>
  <div class="card">
    <p>Enter your details:</p>
    <input type="text" id="nameInput" placeholder="Your name">
    <input type="number" id="ageInput" placeholder="Your age">
    <input type="text" id="hobbyInput" placeholder="Your hobby">
    <br>
    <button onclick="showCard()">Show Card</button>
  </div>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    function showCard() {
      var name = document.getElementById("nameInput").value;
      var age = document.getElementById("ageInput").value;
      var hobby = document.getElementById("hobbyInput").value;

      document.getElementById("out").innerHTML = "";
      log("--- Your Profile Card ---");
      log("Name: " + name);
      log("Age: " + age);
      log("Hobby: " + hobby);

      if (age < 13) {
        log("Category: Junior");
      } else if (age < 18) {
        log("Category: Teen");
      } else {
        log("Category: Adult");
      }
    }
  </script>
</body>
</html>
