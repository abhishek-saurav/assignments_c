<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML DOM</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #2e7d32; text-align: center; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
    p { text-align: center; }
    button { display: block; margin: 10px auto; padding: 8px 20px; background-color: #2e7d32; color: white; border: none; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <h2>HTML DOM</h2>
  <p id="msg">This is a paragraph.</p>
  <button onclick="changeText()">Change Text</button>
  <button onclick="changeColor()">Change Color</button>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    function changeText() {
      document.getElementById("msg").innerHTML = "Text was changed by JavaScript!";
      log("Text changed.");
    }

    function changeColor() {
      document.getElementById("msg").style.color = "red";
      log("Color changed to red.");
    }

    log("DOM lets JS control HTML elements.");
    log("Use getElementById to find elements.");
  </script>
</body>
</html>
