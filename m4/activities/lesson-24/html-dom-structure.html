<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML DOM Structure</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #2e7d32; text-align: center; }
    .output { background-color: #263238; color: #a5d6a7; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
    .box { border: 2px solid #2e7d32; padding: 10px; margin: 10px auto; width: 400px; }
    .box p { margin: 4px 0; }
  </style>
</head>
<body>
  <h2>HTML DOM Structure</h2>
  <div class="box" id="profile">
    <p id="nameTag">Name: Sam</p>
    <p id="ageTag">Age: 15</p>
    <p id="schoolTag">School: Greenfield High School</p>
  </div>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var nameEl = document.getElementById("nameTag");
    var ageEl = document.getElementById("ageTag");
    var schoolEl = document.getElementById("schoolTag");

    log("Name text: " + nameEl.innerHTML);
    log("Age text: " + ageEl.innerHTML);
    log("School text: " + schoolEl.innerHTML);

    log("");
    log("Tag name of #profile: " + document.getElementById("profile").tagName);
    log("Number of child elements: " + document.getElementById("profile").children.length);
  </script>
</body>
</html>
