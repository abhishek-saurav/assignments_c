<!DOCTYPE html>
<html>
<body>
  <h2>Object Data Structure</h2>
  <p id="demo"></p>
  <script>
    var student = {
      name: "Sam",
      age: 15,
      grade: 9,
      fav_color: "blue",
    };
    document.getElementById("demo").innerHTML = student.name + " is " + student.age + " years old";
  </script>
</body>
</html>
