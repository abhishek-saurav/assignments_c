<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Data Structure</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1565c0; text-align: center; }
    .output { background-color: #263238; color: #90caf9; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Object Data Structure</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var book = {
      title: "The Martian",
      author: "Andy Weir",
      pages: 369,
      isRead: true
    };

    var course = {
      name: "JavaScript",
      module: 4,
      lessons: 6,
      completed: false
    };

    log("--- Book ---");
    log("Title: " + book.title);
    log("Author: " + book.author);
    log("Pages: " + book.pages);
    log("Read: " + book.isRead);

    log("");
    log("--- Course ---");
    log("Name: " + course.name);
    log("Module: " + course.module);
    log("Lessons: " + course.lessons);
    log("Completed: " + course.completed);
  </script>
</body>
</html>
