<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Methods in Array</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1565c0; text-align: center; }
    .output { background-color: #263238; color: #90caf9; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Methods in Array</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var fruits = ["apple", "banana", "mango"];

    log("Original: " + fruits);
    log("Length: " + fruits.length);

    fruits.push("grapes");
    log("After push: " + fruits);

    fruits.pop();
    log("After pop: " + fruits);

    fruits.unshift("kiwi");
    log("After unshift: " + fruits);

    fruits.shift();
    log("After shift: " + fruits);

    log("");
    log("Index of banana: " + fruits.indexOf("banana"));
    log("Includes mango: " + fruits.includes("mango"));

    var sliced = fruits.slice(0, 2);
    log("Slice(0,2): " + sliced);

    log("");
    log("Joined with '-': " + fruits.join("-"));
  </script>
</body>
</html>
