<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Object</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    h2 { color: #1565c0; text-align: center; }
    .output { background-color: #263238; color: #90caf9; font-family: monospace; padding: 16px; margin: 20px auto; width: 500px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Math Object</h2>
  <div class="output" id="out"></div>
  <script>
    function log(msg) {
      document.getElementById("out").innerHTML += msg + "<br>";
    }

    var scores = [78, 92, 65, 88, 74];

    log("Scores: " + scores);
    log("Max score: " + Math.max(78, 92, 65, 88, 74));
    log("Min score: " + Math.min(78, 92, 65, 88, 74));

    log("");
    log("Random dice roll: " + (Math.floor(Math.random() * 6) + 1));
    log("Random dice roll: " + (Math.floor(Math.random() * 6) + 1));

    log("");
    log("Square root of 256: " + Math.sqrt(256));
    log("2 to the power 10: " + Math.pow(2, 10));
  </script>
</body>
</html>
