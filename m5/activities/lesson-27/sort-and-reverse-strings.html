<!DOCTYPE html>
<html>
<body>
  <h2>JavaScript Array Sort</h2>
  <p>Sorting string array elements.</p>
  <button onclick="sortIt()">Sort</button>
  <button onclick="reverseIt()">Reverse</button>
  <p id="result"></p>
  <script>
    var fruits = ["Banana", "Orange", "Apple", "Mango", "Kiwi"];
    document.getElementById("result").innerHTML = fruits;
    function sortIt() {
      fruits.sort();
      document.getElementById("result").innerHTML = fruits;
    }
    function reverseIt() {
      fruits.reverse();
      document.getElementById("result").innerHTML = fruits;
    }
  </script>
</body>
</html>
