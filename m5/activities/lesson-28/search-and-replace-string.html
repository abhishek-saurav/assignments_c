<!DOCTYPE html>
<html>
<body>
  <h2>Search and Replace String</h2>
  <p id="search_result"></p>
  <p id="replace_result"></p>
  <script>
    var str = "Visit Microsoft and learn JavaScript";
    var pos = str.search("Microsoft");
    document.getElementById("search_result").innerHTML = pos;
    var newStr = str.replace("Microsoft", "Codingal");
    document.getElementById("replace_result").innerHTML = newStr;
  </script>
</body>
</html>
