<!DOCTYPE html>
<html>
<body>
  <h2>Promises in JS</h2>
  <p id="status">Waiting...</p>
  <script>
    function delay(ms) {
      return new Promise(function(resolve) {
        setTimeout(resolve, ms);
      });
    }
    async function run() {
      await delay(2000);
      document.getElementById("status").innerHTML = "Done waiting!";
    }
    run();
  </script>
</body>
</html>
