<!DOCTYPE html>
<html>
<body>
  <h2>Promises in JS</h2>
  <p id="status">Waiting...</p>
  <script>
    function delay(ms) {
      return new Promise(function(resolve) {
        setTimeout(resolve, ms);
      });
    }
    delay(2000).then(function() {
      document.getElementById("status").innerHTML = "Promise resolved after 2 seconds!";
    });
  </script>
</body>
</html>
