<!DOCTYPE html>
<html>
<body>
  <h2>Validation Using API</h2>
  <input type="text" id="emailInput" placeholder="Enter your email">
  <button onclick="validateEmail()">Check</button>
  <p id="message"></p>
  <script>
    function validateEmail() {
      var email = document.getElementById("emailInput").value;
      if (email === "") {
        document.getElementById("message").innerHTML = "Email cannot be empty.";
      } else if (email.includes("@") === false) {
        document.getElementById("message").innerHTML = "Email must contain @.";
      } else {
        document.getElementById("message").innerHTML = "Valid email: " + email;
      }
    }
  </script>
</body>
</html>
