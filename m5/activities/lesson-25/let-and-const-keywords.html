<!DOCTYPE html>
<html>
<body>
  <h2>let and const Keywords</h2>
  <p id="demo"></p>
  <script>
    let myScore = 75;
    const highScore = 100;
    let isTopScore = myScore == highScore;
    document.getElementById("demo").innerHTML = "My score: " + myScore + "<br>High score: " + highScore + "<br>Is top score: " + isTopScore;
  </script>
</body>
</html>
