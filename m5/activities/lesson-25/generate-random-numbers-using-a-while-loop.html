<!DOCTYPE html>
<html>
<body>
  <h2>Generate Random Numbers Using a While Loop</h2>
  <p id="demo"></p>
  <script>
    let stars = "";
    let count = 0;
    while (count < 5) {
      stars = stars + "* ";
      count = count + 1;
    }
    document.getElementById("demo").innerHTML = stars;
  </script>
</body>
</html>
