<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Let's Experiment with Grid</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f5f5f5;
    }

    .box {
      padding: 20px;
      text-align: center;
      color: white;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .blue   { background-color: #1565c0; }
    .purple { background-color: #6a1b9a; }
    .red    { background-color: #b71c1c; }
    .green  { background-color: #2e7d32; }
    .orange { background-color: #e65100; }
    .teal   { background-color: #00695c; }
  </style>
</head>
<body>

  <div class="container" style="margin-top: 30px;">
    <h1 style="color: #1a237e;">Let's Experiment with Grid</h1>

    <h4 style="color: #546e7a; margin-top: 20px;">Two columns — 6 + 6</h4>
    <div class="row">
      <div class="col-sm-6"><div class="box blue">col-sm-6</div></div>
      <div class="col-sm-6"><div class="box purple">col-sm-6</div></div>
    </div>

    <h4 style="color: #546e7a; margin-top: 20px;">Four columns — 3 + 3 + 3 + 3</h4>
    <div class="row">
      <div class="col-sm-3"><div class="box red">col-sm-3</div></div>
      <div class="col-sm-3"><div class="box green">col-sm-3</div></div>
      <div class="col-sm-3"><div class="box orange">col-sm-3</div></div>
      <div class="col-sm-3"><div class="box teal">col-sm-3</div></div>
    </div>

    <h4 style="color: #546e7a; margin-top: 20px;">Unequal — 4 + 8</h4>
    <div class="row">
      <div class="col-sm-4"><div class="box blue">col-sm-4</div></div>
      <div class="col-sm-8"><div class="box purple">col-sm-8</div></div>
    </div>
  </div>

  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
