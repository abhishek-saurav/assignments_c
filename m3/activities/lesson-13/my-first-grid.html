<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My First Grid</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f5f5f5;
    }

    .box {
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    #box1 { background-color: #1565c0; }
    #box2 { background-color: #6a1b9a; }
    #box3 { background-color: #bf360c; }
  </style>
</head>
<body>

  <div class="container" style="margin-top: 30px;">
    <h1 style="text-align: center; color: #1a237e;">My First Grid</h1>
    <p style="text-align: center; color: #546e7a;">Three equal columns using col-sm-4</p>

    <div class="row">
      <div class="col-sm-4">
        <div class="box" id="box1">Column 1</div>
      </div>
      <div class="col-sm-4">
        <div class="box" id="box2">Column 2</div>
      </div>
      <div class="col-sm-4">
        <div class="box" id="box3">Column 3</div>
      </div>
    </div>
  </div>

  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
