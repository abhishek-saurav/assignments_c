<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Badges</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

  <div class="container" style="margin-top: 30px;">
    <h1 style="color: #1a237e;">Bootstrap Badges</h1>

    <h3 style="margin-top: 20px; color: #37474f;">Badges inside headings</h3>
    <h2>Chess Club <span class="badge badge-primary">New</span></h2>
    <h4>Photography <span class="badge badge-success">Active</span></h4>
    <h5>Guitar Practice <span class="badge badge-warning">Ongoing</span></h5>

    <h3 style="margin-top: 30px; color: #37474f;">Badge colours</h3>
    <p>
      <span class="badge badge-primary">Primary</span>
      <span class="badge badge-secondary">Secondary</span>
      <span class="badge badge-success">Success</span>
      <span class="badge badge-danger">Danger</span>
      <span class="badge badge-warning">Warning</span>
      <span class="badge badge-info">Info</span>
      <span class="badge badge-dark">Dark</span>
      <span class="badge badge-light">Light</span>
    </p>

    <h3 style="margin-top: 30px; color: #37474f;">Pill badges</h3>
    <p>
      <span class="badge badge-pill badge-primary">Primary</span>
      <span class="badge badge-pill badge-success">Success</span>
      <span class="badge badge-pill badge-danger">Danger</span>
      <span class="badge badge-pill badge-warning">Warning</span>
    </p>

    <h3 style="margin-top: 30px; color: #37474f;">Badge on a button</h3>
    <button class="btn btn-primary">
      Messages <span class="badge badge-light">4</span>
    </button>
    <button class="btn btn-success" style="margin-left: 10px;">
      Notifications <span class="badge badge-light">12</span>
    </button>
  </div>

  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
