<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carousel</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    .slide-box {
      height: 280px;
      text-align: center;
      padding-top: 90px;
      color: white;
    }

    #s1 { background-color: #1565c0; }
    #s2 { background-color: #2e7d32; }
    #s3 { background-color: #6a1b9a; }
  </style>
</head>
<body>

  <div class="container" style="margin-top: 30px;">
    <h1 style="color: #1a237e; text-align: center;">Bootstrap Carousel</h1>

    <div id="myCarousel" class="carousel slide" data-ride="carousel" style="margin-top: 20px;">

      <ol class="carousel-indicators">
        <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
        <li data-target="#myCarousel" data-slide-to="1"></li>
        <li data-target="#myCarousel" data-slide-to="2"></li>
      </ol>

      <div class="carousel-inner">

        <div class="carousel-item active">
          <div class="slide-box" id="s1">
            <h2>Slide One</h2>
            <p>This is the first slide</p>
          </div>
        </div>

        <div class="carousel-item">
          <div class="slide-box" id="s2">
            <h2>Slide Two</h2>
            <p>This is the second slide</p>
          </div>
        </div>

        <div class="carousel-item">
          <div class="slide-box" id="s3">
            <h2>Slide Three</h2>
            <p>This is the third slide</p>
          </div>
        </div>

      </div>

      <a class="carousel-control-prev" href="#myCarousel" data-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </a>
      <a class="carousel-control-next" href="#myCarousel" data-slide="next">
        <span class="carousel-control-next-icon"></span>
      </a>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
